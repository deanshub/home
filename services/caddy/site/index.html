<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>smrt casa</title>
    <link rel="icon" type="image/jpeg" href="/casa.jpeg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-gray-50 min-h-screen">
    <div class="max-w-7xl mx-auto px-4 py-8">
      <div class="flex flex-col items-center mb-8">
        <img src="/casa.jpeg" alt="Casa" class="w-20 h-20 rounded-2xl shadow-lg mb-4" />
        <h1 class="text-3xl font-bold text-gray-800">Casa</h1>
      </div>
      <div class="mb-8 max-w-md mx-auto w-full">
        <input
          id="search"
          type="text"
          placeholder="Search services..."
          autocomplete="off"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-gray-300 text-lg text-gray-700 placeholder-gray-400"
        />
      </div>
      <div id="services"></div>
    </div>

    <script>
      const servicesData = {{include "config.json"}};
      const container = document.getElementById('services');
      
      const servicesByCategory = servicesData.services
        .filter(service => service.url)
        .reduce((acc, service) => {
          const cat = service.category || 'other';
          if (!acc[cat]) acc[cat] = [];
          acc[cat].push(service);
          return acc;
        }, {});

      Object.keys(servicesByCategory).sort().forEach(category => {
        const section = document.createElement('div');
        section.className = 'mb-8';
        section.dataset.section = category.toLowerCase();
        
        const heading = document.createElement('h2');
        heading.className = 'text-xl font-semibold text-gray-700 mb-4 capitalize';
        heading.textContent = category;
        section.appendChild(heading);
        
        const grid = document.createElement('div');
        grid.className = 'grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4';
        
        servicesByCategory[category].sort((a, b) => a.label.localeCompare(b.label)).forEach(service => {
          const link = document.createElement('a');
          link.href = service.url;
          link.className = `flex items-center justify-center p-6 text-center bg-${service.color}-100 hover:bg-${service.color}-200 capitalize rounded-xl shadow-sm hover:shadow-md transition-all duration-200 text-xl font-semibold text-gray-700`;
          link.textContent = service.label;
          link.dataset.service = service.label.toLowerCase();
          link.dataset.category = category.toLowerCase();
          grid.appendChild(link);
        });
        
        section.appendChild(grid);
        container.appendChild(section);
      });

      const searchInput = document.getElementById('search');
      searchInput.focus();

      searchInput.addEventListener('input', () => {
        const query = searchInput.value.toLowerCase().trim();
        container.querySelectorAll('[data-section]').forEach(section => {
          const links = section.querySelectorAll('[data-service]');
          let visible = 0;
          links.forEach(link => {
            const show = !query || link.dataset.service.includes(query) || link.dataset.category.includes(query);
            link.style.display = show ? '' : 'none';
            if (show) visible++;
          });
          section.style.display = visible ? '' : 'none';
        });
      });

      // Register service worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
      }
    </script>
  </body>
</html>
