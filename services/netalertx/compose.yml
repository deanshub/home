services:
  netalertx:
    image: ghcr.io/netalertx/netalertx:latest
    container_name: netalertx
    restart: unless-stopped
    network_mode: host
    ports:
      - "20211:20211"
      - "20212:20212"
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
    read_only: true
    tmpfs:
      - /tmp/run:size=64m
      - /tmp/log:size=64m
      - /tmp/api:size=64m
      - /tmp/nginx/active-config:size=16m
    labels:
      url: "https://netalertx.{{ domain }}"
      title: "NetAlertX"
      category: "network"
      color: "cyan"
    environment:
      - TZ=Asia/Jerusalem
      - PORT=20211
      - GRAPHQL_PORT=20212
    volumes:
      - /media/external/configs/netalertx:/data
    mem_limit: 2048m
    mem_reservation: 1024m
    cpu_shares: 512
    pids_limit: 512
    logging:
      options:
        max-size: "10m"
        max-file: "3"
