services:
  forgejo:
    image: codeberg.org/forgejo/forgejo:15
    container_name: forgejo
    restart: unless-stopped
    environment:
      - TZ=Asia/Jerusalem
      - USER_UID=1000
      - USER_GID=1000
      - FORGEJO__server__DOMAIN=git.home.shubapp.com
      - FORGEJO__server__ROOT_URL=https://git.home.shubapp.com/
      - FORGEJO__server__HTTP_PORT=3000
    volumes:
      - /media/external/configs/forgejo:/data
    networks:
      - caddy
    ports:
      - "3000:3000"
      - "2222:22"
    labels:
      url: "https://git.{{ domain }}"
      color: "slate"
      title: "Git"
      category: "tools & automation"

networks:
  caddy:
    external: true
