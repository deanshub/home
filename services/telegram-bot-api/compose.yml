networks:
  caddy:
    external: true

services:
  telegram-bot-api:
    container_name: telegram-bot-api
    image: aiogram/telegram-bot-api:latest
    restart: unless-stopped
    user: "1000:1000"
    networks:
      - caddy
    env_file:
      - .env
    environment:
      - TELEGRAM_LOCAL=true
      - TELEGRAM_HTTP_PORT=8089
    volumes:
      - /media/external/library/telegram-bot-api:/var/lib/telegram-bot-api
    ports:
      - "8089:8089"
